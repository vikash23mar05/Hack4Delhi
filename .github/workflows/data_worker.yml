name: Automated Delhi Ward AQI Updater

on:
  schedule:
    - cron: '0 * * * *' # Every 60 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  update_aqi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests supabase

      - name: Run AQI Update Script
        env:
          DATA_GOV_KEY: ${{ secrets.DATA_GOV_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/update_aqi.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Ward-Wise Delhi AI Bot"
          git config --global user.email "bot@delhiaqi.gov"
          git add .
          git commit -m "🤖 [BOT] Update Hourly Ward-Wise AQI Predictions" || echo "No changes to commit"
          git push origin main
